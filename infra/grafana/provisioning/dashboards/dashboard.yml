# =============================================================================
# Grafana Dashboard Provisioning — Auto-loads MedClaim dashboard
# =============================================================================

apiVersion: 1

providers:
  - name: "MedClaim Dashboards"
    orgId: 1
    folder: "MedClaim"
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
